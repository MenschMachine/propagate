version: "6"

agents:
  default:
    command: 'select-best-agent.sh "Read the file {prompt_file} and follow its instructions."'

agent: default

repositories:
  pdfdancer-www:
    url: git@github.com:MenschMachine/pdfdancer-www.git

signals:
  include:
    - signals/default.yaml
    - signals/github-signals.yaml

executions:
  request-index:
    repository: pdfdancer-www
    signals:
      - signal: push
        when:
          repository: MenschMachine/pdfdancer-www
          ref: refs/heads/main
    sub_tasks:
      - id: wait-for-deploy
        before:
          - 'echo "Waiting 10 minutes for Cloudflare Pages to deploy..."'
          - 'sleep 600'
      - id: submit-to-google
        before:
          - venv/bin/pip install -r ${PROPAGATE_CONFIG_DIR}/scripts/requirements-indexing.txt
          - venv/bin/python ${PROPAGATE_CONFIG_DIR}/scripts/submit_request_indexing.py
