# Complete downstream workflow for a merged `pdfdancer-backend` PR or a labeled open
# `pdfdancer-api` PR.
#
# Trigger semantics:
# - This config starts from either:
#   - `pull_request.closed` on `MenschMachine/pdfdancer-backend` with `merged=true`
#   - `pull_request.labeled` on `MenschMachine/pdfdancer-api` with `label=propagate`
#     while the PR is still open
# - Review-loop labels such as `approved` and `changes_required` are only used for the
#   downstream PRs created by this workflow. They do not start the workflow.
#
# High-level shape:
# 1. Entry triage
#    - `triage-backend-pr` validates a merged backend PR and decides whether the
#      change needs downstream code implementation (`FULL`) or only docs/website
#      follow-up (`DOCS`)
#    - `triage-api-pr` validates an open API PR labeled `propagate` and makes the same
#      decision, treating that API PR as the authoritative upstream input
#
# 2. FULL pipeline
#    - `implement-pdfdancer-api`
#    - `implement-client-{typescript,python,java}`
#    - `implement-client-{typescript,python,java}-examples`
#    - `implement-pdfdancer-api-docs`
#    - `implement-pdfdancer-www`
#
# 3. DOCS pipeline
#    - `implement-pdfdancer-api-docs`
#    - `implement-pdfdancer-www`
#
# Review-loop contract:
# - Every downstream repo uses the same reusable include template from
#   `executions/pdfdancer/review-loop.yaml`.
# - Each loop creates a branch + PR, waits for GitHub Actions checks, then waits for a
#   `pull_request.labeled` event on that exact PR number.
# - `changes_required` routes back to the implementation task.
# - `approved` continues the DAG.
#
# Fan-out / fan-in behavior:
# - The 3 SDK repos are activated as separate executions after the API execution completes.
# - When all 3 SDK executions have completed successfully, a shared context flag
#   (`all-sdks-approved`) is written and the 3 example repos are activated.
# - When all 3 example executions have completed successfully, a second shared flag
#   (`all-examples-approved`) is written and the docs stage starts.
#
# Important implementation detail:
# - The scheduler activates multiple downstream executions, but still runs runnable work in
#   config order. So "parallel" here means DAG fan-out and independent approval gates, not
#   true concurrent execution.

version: "6"

agents:
  default:
    command: 'claude --dangerously-skip-permissions --permission-mode bypassPermissions --settings /home/michael/.claude/settings-minimax.json -p "Read the file {prompt_file} and follow its instructions."'
  agent-easy:
    command: 'claude --dangerously-skip-permissions --permission-mode bypassPermissions --settings /home/michael/.claude/settings-minimax.json -p "Read the file {prompt_file} and follow its instructions."'
  agent-hard:
    command: 'codex exec --dangerously-bypass-approvals-and-sandbox "Read the file {prompt_file} and follow its instructions."'

agent: default

repositories:
  pdfdancer-backend:
    url: git@github.com:MenschMachine/pdfdancer-backend.git
  pdfdancer-api:
    url: git@github.com:MenschMachine/pdfdancer-api.git
  pdfdancer-api-docs:
    url: git@github.com:MenschMachine/pdfdancer-api-docs.git
  pdfdancer-www:
    url: git@github.com:MenschMachine/pdfdancer-www.git
  pdfdancer-client-typescript:
    url: git@github.com:MenschMachine/pdfdancer-client-typescript.git
  pdfdancer-client-python:
    url: git@github.com:MenschMachine/pdfdancer-client-python.git
  pdfdancer-client-java:
    url: git@github.com:MenschMachine/pdfdancer-client-java.git
  pdfdancer-client-typescript-examples:
    url: git@github.com:MenschMachine/pdfdancer-client-typescript-examples.git
  pdfdancer-client-python-examples:
    url: git@github.com:MenschMachine/pdfdancer-client-python-examples.git
  pdfdancer-client-java-examples:
    url: git@github.com:MenschMachine/pdfdancer-client-java-examples.git

signals:
  include:
    - signals/default.yaml
    - signals/github-signals.yaml

context_sources:
  capture-upstream-api-pr:
    command: 'UPSTREAM="$(propagate context get :api-pr-number | xargs)"; if [[ -n "$UPSTREAM" ]]; then propagate context set --global :upstream-api-pr-number "$UPSTREAM"; fi'
  mark-all-sdks-approved:
    command: 'if propagate context get approved-marker --task implement-client-typescript >/dev/null 2>&1 && propagate context get approved-marker --task implement-client-python >/dev/null 2>&1 && propagate context get approved-marker --task implement-client-java >/dev/null 2>&1; then propagate context set all-sdks-approved true; fi'
  mark-all-examples-approved:
    command: 'if propagate context get approved-marker --task implement-client-typescript-examples >/dev/null 2>&1 && propagate context get approved-marker --task implement-client-python-examples >/dev/null 2>&1 && propagate context get approved-marker --task implement-client-java-examples >/dev/null 2>&1; then propagate context set all-examples-approved true; fi'

executions:
  include:
    - path: executions/pdfdancer/review-loop.yaml
      with:
        execution_name: implement-pdfdancer-api
        repository: pdfdancer-api
        branch_name_template: "api/backend-pr-{context[triage-backend-pr][:source-backend-pr-number]}"
        commit_message_template: "api: support backend PR #{context[triage-backend-pr][:source-backend-pr-number]}"
        pr_body_key: :api-pr-body
        pr_number_key: :api-pr-number
        github_repository: MenschMachine/pdfdancer-api
        validate_before_actions:
          - validate:github-pr repo=MenschMachine/pdfdancer-backend pr_from=context:triage-backend-pr/:source-backend-pr-number require_merged=true
          - validate:context-key key=:run-full-pipeline scope=global
        validate_prompt: null
        implement_prompt: ./prompts/pdfdancer/implement-api-from-backend-pr.md
        review_prompt: ./prompts/pdfdancer/review-api.md
        summarize_prompt: ./prompts/pdfdancer/summarize-api-from-backend-pr.md
        aggregate_after_command: :capture-upstream-api-pr
    - path: executions/pdfdancer/review-loop.yaml
      with:
        execution_name: implement-client-typescript
        repository: pdfdancer-client-typescript
        branch_name_template: "client-typescript/source-pr-{context[global][:source-pr-number]}"
        commit_message_template: "client-typescript: follow up source PR #{context[global][:source-pr-number]}"
        pr_body_key: :client-typescript-pr-body
        pr_number_key: :client-typescript-pr-number
        github_repository: MenschMachine/pdfdancer-client-typescript
        validate_before_actions:
          - validate:github-pr repo_from=context:global/:source-repository pr_from=context:global/:source-pr-number
          - validate:github-pr repo=MenschMachine/pdfdancer-api pr_from=context:global/:upstream-api-pr-number
        validate_prompt: null
        implement_prompt: ./prompts/pdfdancer/implement-client-sdk-from-api-pr.md
        review_prompt: ./prompts/pdfdancer/review-client-sdk.md
        summarize_prompt: ./prompts/pdfdancer/summarize-client-sdk-from-api-pr.md
        aggregate_after_command: :mark-all-sdks-approved
    - path: executions/pdfdancer/review-loop.yaml
      with:
        execution_name: implement-client-python
        repository: pdfdancer-client-python
        branch_name_template: "client-python/source-pr-{context[global][:source-pr-number]}"
        commit_message_template: "client-python: follow up source PR #{context[global][:source-pr-number]}"
        pr_body_key: :client-python-pr-body
        pr_number_key: :client-python-pr-number
        github_repository: MenschMachine/pdfdancer-client-python
        validate_before_actions:
          - validate:github-pr repo_from=context:global/:source-repository pr_from=context:global/:source-pr-number
          - validate:github-pr repo=MenschMachine/pdfdancer-api pr_from=context:global/:upstream-api-pr-number
        validate_prompt: null
        implement_prompt: ./prompts/pdfdancer/implement-client-sdk-from-api-pr.md
        review_prompt: ./prompts/pdfdancer/review-client-sdk.md
        summarize_prompt: ./prompts/pdfdancer/summarize-client-sdk-from-api-pr.md
        aggregate_after_command: :mark-all-sdks-approved
    - path: executions/pdfdancer/review-loop.yaml
      with:
        execution_name: implement-client-java
        repository: pdfdancer-client-java
        branch_name_template: "client-java/source-pr-{context[global][:source-pr-number]}"
        commit_message_template: "client-java: follow up source PR #{context[global][:source-pr-number]}"
        pr_body_key: :client-java-pr-body
        pr_number_key: :client-java-pr-number
        github_repository: MenschMachine/pdfdancer-client-java
        validate_before_actions:
          - validate:github-pr repo_from=context:global/:source-repository pr_from=context:global/:source-pr-number
          - validate:github-pr repo=MenschMachine/pdfdancer-api pr_from=context:global/:upstream-api-pr-number
        validate_prompt: null
        implement_prompt: ./prompts/pdfdancer/implement-client-sdk-from-api-pr.md
        review_prompt: ./prompts/pdfdancer/review-client-sdk.md
        summarize_prompt: ./prompts/pdfdancer/summarize-client-sdk-from-api-pr.md
        aggregate_after_command: :mark-all-sdks-approved
    - path: executions/pdfdancer/review-loop.yaml
      with:
        agent: agent-easy
        execution_name: implement-client-typescript-examples
        repository: pdfdancer-client-typescript-examples
        branch_name_template: "client-typescript-examples/source-pr-{context[global][:source-pr-number]}"
        commit_message_template: "client-typescript-examples: follow up source PR #{context[global][:source-pr-number]}"
        pr_body_key: :client-typescript-examples-pr-body
        pr_number_key: :client-typescript-examples-pr-number
        github_repository: MenschMachine/pdfdancer-client-typescript-examples
        validate_before_actions:
          - validate:github-pr repo_from=context:global/:source-repository pr_from=context:global/:source-pr-number
          - validate:github-pr repo=MenschMachine/pdfdancer-client-typescript pr_from=context:implement-client-typescript/:client-typescript-pr-number
        validate_prompt: null
        implement_prompt: ./prompts/pdfdancer/implement-client-typescript-examples-from-sdk-pr.md
        review_prompt: ./prompts/pdfdancer/review-examples.md
        summarize_prompt: ./prompts/pdfdancer/summarize-client-examples-from-sdk-pr.md
        aggregate_after_command: :mark-all-examples-approved
    - path: executions/pdfdancer/review-loop.yaml
      with:
        agent: agent-easy
        execution_name: implement-client-python-examples
        repository: pdfdancer-client-python-examples
        branch_name_template: "client-python-examples/source-pr-{context[global][:source-pr-number]}"
        commit_message_template: "client-python-examples: follow up source PR #{context[global][:source-pr-number]}"
        pr_body_key: :client-python-examples-pr-body
        pr_number_key: :client-python-examples-pr-number
        github_repository: MenschMachine/pdfdancer-client-python-examples
        validate_before_actions:
          - validate:github-pr repo_from=context:global/:source-repository pr_from=context:global/:source-pr-number
          - validate:github-pr repo=MenschMachine/pdfdancer-client-python pr_from=context:implement-client-python/:client-python-pr-number
        validate_prompt: null
        implement_prompt: ./prompts/pdfdancer/implement-client-python-examples-from-sdk-pr.md
        review_prompt: ./prompts/pdfdancer/review-examples.md
        summarize_prompt: ./prompts/pdfdancer/summarize-client-examples-from-sdk-pr.md
        aggregate_after_command: :mark-all-examples-approved
    - path: executions/pdfdancer/review-loop.yaml
      with:
        agent: agent-easy
        execution_name: implement-client-java-examples
        repository: pdfdancer-client-java-examples
        branch_name_template: "client-java-examples/source-pr-{context[global][:source-pr-number]}"
        commit_message_template: "client-java-examples: follow up source PR #{context[global][:source-pr-number]}"
        pr_body_key: :client-java-examples-pr-body
        pr_number_key: :client-java-examples-pr-number
        github_repository: MenschMachine/pdfdancer-client-java-examples
        validate_before_actions:
          - validate:github-pr repo_from=context:global/:source-repository pr_from=context:global/:source-pr-number
          - validate:github-pr repo=MenschMachine/pdfdancer-client-java pr_from=context:implement-client-java/:client-java-pr-number
        validate_prompt: null
        implement_prompt: ./prompts/pdfdancer/implement-client-java-examples-from-sdk-pr.md
        review_prompt: ./prompts/pdfdancer/review-examples.md
        summarize_prompt: ./prompts/pdfdancer/summarize-client-examples-from-sdk-pr.md
        aggregate_after_command: :mark-all-examples-approved
    - path: executions/pdfdancer/review-loop.yaml
      with:
        execution_name: implement-pdfdancer-api-docs
        repository: pdfdancer-api-docs
        branch_name_template: "api-docs/source-pr-{context[global][:source-pr-number]}"
        commit_message_template: "api-docs: document source PR #{context[global][:source-pr-number]}"
        pr_body_key: :api-docs-pr-body
        pr_number_key: :api-docs-pr-number
        github_repository: MenschMachine/pdfdancer-api-docs
        validate_before_actions:
          - validate:github-pr repo_from=context:global/:source-repository pr_from=context:global/:source-pr-number
          - validate:context-key key=:pipeline-decision scope=global
        validate_prompt: null
        implement_prompt: ./prompts/pdfdancer/implement-api-docs-from-workflow-context.md
        review_prompt: ./prompts/pdfdancer/review-api-docs.md
        summarize_prompt: ./prompts/pdfdancer/summarize-api-docs-from-workflow-context.md
        aggregate_after_command: "true"
    - path: executions/pdfdancer/review-loop.yaml
      with:
        execution_name: implement-pdfdancer-www
        repository: pdfdancer-www
        branch_name_template: "website/source-pr-{context[global][:source-pr-number]}"
        commit_message_template: "website: reflect source PR #{context[global][:source-pr-number]}"
        pr_body_key: :website-pr-body
        pr_number_key: :website-pr-number
        github_repository: MenschMachine/pdfdancer-www
        validate_before_actions:
          - validate:github-pr repo_from=context:global/:source-repository pr_from=context:global/:source-pr-number
          - validate:github-pr repo=MenschMachine/pdfdancer-api-docs pr_from=context:implement-pdfdancer-api-docs/:api-docs-pr-number
        validate_prompt: null
        implement_prompt: ./prompts/pdfdancer/implement-website-from-workflow-context.md
        review_prompt: ./prompts/pdfdancer/review-website.md
        summarize_prompt: ./prompts/pdfdancer/summarize-website-from-workflow-context.md
        aggregate_after_command: "true"

  triage-backend-pr:
    repository: pdfdancer-backend
    signals:
      - signal: pull_request.closed
        when:
          repository: MenschMachine/pdfdancer-backend
          merged: true
    sub_tasks:
      - id: validate-backend-pr
        before:
          - validate:github-pr repo=MenschMachine/pdfdancer-backend pr_from=signal.pr_number require_merged=true
      - id: decide-pipeline
        prompt: ./prompts/pdfdancer/decide-backend-pipeline.md

  triage-api-pr:
    repository: pdfdancer-api
    signals:
      - signal: pull_request.labeled
        when:
          repository: MenschMachine/pdfdancer-api
          label: propagate
    sub_tasks:
      - id: validate-api-pr
        before:
          - validate:github-pr repo=MenschMachine/pdfdancer-api pr_from=signal.pr_number
          - 'gh pr view "$(propagate context get :signal.pr_number | xargs)" --repo MenschMachine/pdfdancer-api --json state --jq ''.state'' | grep -q ''^OPEN$'''
      - id: decide-pipeline
        prompt: ./prompts/pdfdancer/decide-api-pipeline.md

  assess-complexity-backend:
    repository: pdfdancer-backend
    sub_tasks:
      - id: assess
        prompt: ./prompts/pdfdancer/assess-complexity.md

  assess-complexity-api:
    repository: pdfdancer-api
    sub_tasks:
      - id: assess
        prompt: ./prompts/pdfdancer/assess-complexity.md

propagation:
  triggers:
    - after: triage-backend-pr
      run: assess-complexity-backend
    - after: assess-complexity-backend
      run: implement-pdfdancer-api
    - after: assess-complexity-backend
      run: implement-pdfdancer-api-docs
    - after: triage-api-pr
      run: assess-complexity-api
    - after: assess-complexity-api
      run: implement-client-typescript
    - after: assess-complexity-api
      run: implement-client-python
    - after: assess-complexity-api
      run: implement-client-java
    - after: assess-complexity-api
      run: implement-pdfdancer-api-docs
    - after: implement-pdfdancer-api
      run: implement-client-typescript
    - after: implement-pdfdancer-api
      run: implement-client-python
    - after: implement-pdfdancer-api
      run: implement-client-java
    - after: implement-client-typescript
      run: implement-client-typescript-examples
      when_context: :all-sdks-approved
    - after: implement-client-typescript
      run: implement-client-python-examples
      when_context: :all-sdks-approved
    - after: implement-client-typescript
      run: implement-client-java-examples
      when_context: :all-sdks-approved
    - after: implement-client-python
      run: implement-client-typescript-examples
      when_context: :all-sdks-approved
    - after: implement-client-python
      run: implement-client-python-examples
      when_context: :all-sdks-approved
    - after: implement-client-python
      run: implement-client-java-examples
      when_context: :all-sdks-approved
    - after: implement-client-java
      run: implement-client-typescript-examples
      when_context: :all-sdks-approved
    - after: implement-client-java
      run: implement-client-python-examples
      when_context: :all-sdks-approved
    - after: implement-client-java
      run: implement-client-java-examples
      when_context: :all-sdks-approved
    - after: implement-client-typescript-examples
      run: implement-pdfdancer-api-docs
      when_context: :all-examples-approved
    - after: implement-client-python-examples
      run: implement-pdfdancer-api-docs
      when_context: :all-examples-approved
    - after: implement-client-java-examples
      run: implement-pdfdancer-api-docs
      when_context: :all-examples-approved
    - after: implement-pdfdancer-api-docs
      run: implement-pdfdancer-www
