  push:
    payload:
      repository:
        type: string
        required: true
      ref:
        type: string
        required: true
      head_commit_sha:
        type: string
      sender:
        type: string

  pull_request.opened:
    payload:
      repository:
        type: string
        required: true
      pr_number:
        type: number
        required: true
      merged:
        type: boolean
      head_ref:
        type: string
      base_ref:
        type: string
      sender:
        type: string
      action:
        type: string
    check: "gh pr view {pr_number} --repo {repository} --json state --jq '.state' | grep -q '^OPEN$'"

  pull_request.closed:
    payload:
      repository:
        type: string
        required: true
      pr_number:
        type: number
        required: true
      merged:
        type: boolean
      head_ref:
        type: string
      base_ref:
        type: string
      sender:
        type: string
      action:
        type: string
    check: "gh pr view {pr_number} --repo {repository} --json state --jq '.state' | grep -q '^CLOSED$\\|^MERGED$'"

  pull_request.reopened:
    payload:
      repository:
        type: string
        required: true
      pr_number:
        type: number
        required: true
      merged:
        type: boolean
      head_ref:
        type: string
      base_ref:
        type: string
      sender:
        type: string
      action:
        type: string
    check: "gh pr view {pr_number} --repo {repository} --json state --jq '.state' | grep -q '^OPEN$'"

  pull_request.labeled:
    payload:
      repository:
        type: string
        required: true
      pr_number:
        type: number
        required: true
      merged:
        type: boolean
      label:
        type: string
        required: true
      head_ref:
        type: string
      base_ref:
        type: string
      sender:
        type: string
      action:
        type: string
    check: "gh pr view {pr_number} --repo {repository} --json labels --jq '.labels[].name' | grep -q '^{label}$'"

  pull_request.unlabeled:
    payload:
      repository:
        type: string
        required: true
      pr_number:
        type: number
        required: true
      merged:
        type: boolean
      label:
        type: string
        required: true
      head_ref:
        type: string
      base_ref:
        type: string
      sender:
        type: string
      action:
        type: string
    check: "! gh pr view {pr_number} --repo {repository} --json labels --jq '.labels[].name' | grep -q '^{label}$'"

  issues.opened:
    payload:
      repository:
        type: string
        required: true
      issue_number:
        type: number
        required: true
      issue_title:
        type: string
      issue_body:
        type: string
      state:
        type: string
      sender:
        type: string
      action:
        type: string
    check: "gh issue view {issue_number} --repo {repository} --json state --jq '.state' | grep -q '^OPEN$'"

  issues.closed:
    payload:
      repository:
        type: string
        required: true
      issue_number:
        type: number
        required: true
      issue_title:
        type: string
      issue_body:
        type: string
      state:
        type: string
      sender:
        type: string
      action:
        type: string
    check: "gh issue view {issue_number} --repo {repository} --json state --jq '.state' | grep -q '^CLOSED$'"

  issues.reopened:
