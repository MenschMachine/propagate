# SEO Automation Pipeline for pdfdancer.com
#
# Main DAG (triggered by "start" signal):
#
#   pull-data → evaluate-implementations → analyze → suggest → implement → track-implementations → request-index
#
# 1. pull-data:              Fetches GSC and PostHog data into
#                            pdfdancer-marketing-data/data/YYYY-MM-DD/, commits to main.
# 2. evaluate-implementations:
#                            Reads data/feedback/implementations.yaml, checks evaluation
#                            gates (14-day floor + volume threshold), scores mature entries
#                            using std dev noise check, writes results back to ledger.
#                            Sole owner of ledger evaluation writes. Commits to main.
# 3. analyze:                Reads the fetched data and the evaluated ledger (read-only).
#                            Writes an analysis report to reports/YYYY-MM-DD/ with an
#                            Implementation Effectiveness section. Commits to main.
#                            If enrichment data exists, includes competitor and keyword
#                            opportunity analysis.
# 4. suggest:                Opens a PR on pdfdancer-marketing-data with concrete SEO
#                            recommendations. Uses effectiveness data from :findings
#                            for cool-down and pattern matching. Waits for a label:
#                            "approved" continues, "changes_required" loops back to revise.
# 5. implement:              Switches to the pdfdancer-www repo.
#                            Reads the approved suggestions from the marketing-data
#                            context and applies them — editing page metadata, titles,
#                            headings, internal links, or content. Opens a PR on
#                            pdfdancer-www with the same label-based review loop.
# 6. track-implementations:  Switches back to pdfdancer-marketing-data. Records which
#                            suggestions were implemented with baseline metrics into
#                            data/feedback/implementations.yaml for future evaluation.
#                            Sole owner of ledger append writes. Commits to main.
# 7. request-index:          Runs in the pdfdancer-www repo after tracking completes.
#                            Reads the list of changed URL paths from context and
#                            submits them to the Google Indexing API so crawlers
#                            pick up the changes quickly.
#
# Standalone execution (triggered by "enrich" signal):
#
#   enrich-seo
#
# enrich-seo:       Fetches DataForSEO competitor SERP data and related
#                    keyword opportunities for striking-distance keywords.
#                    Writes to data/enrichment/YYYY-MM-DD/, commits to main.
#                    Run weekly to keep API costs low (~$0.50/week).
#                    Usage: propagate run --config config/seo-automation.yaml --signal enrich
#
# Env vars needed:
#   GOOGLE_APPLICATION_CREDENTIALS  — service account JSON (GSC + Indexing)
#   POSTHOG_API_KEY                 — PostHog personal API key
#   POSTHOG_PROJECT_ID              — PostHog project ID
#   DATAFORSEO_LOGIN / DATAFORSEO_PASSWORD — DataForSEO API credentials
#   DATAFORSEO_SERP_LIMIT — Max SERP lookups per run (default: 50)
#   DATAFORSEO_SEED_LIMIT — Max related keyword seeds (default: 20)
#   MARKETING_DATA_ENV    — Path to marketing-data .env file (default: .env in working dir)

version: "6"

agent:
  command: 'codex exec --dangerously-bypass-approvals-and-sandbox "Read the file {prompt_file} and follow its instructions."'

repositories:
  pdfdancer-marketing-data:
    url: git@github.com:MenschMachine/pdfdancer-marketing-data.git
  pdfdancer-www:
    url: git@github.com:MenschMachine/pdfdancer-www.git

context_sources:
  commit_message:
    command: gommit -A -n -I
  seo-data-commit:
    command: 'printf "seo: data pull %s\n" "$(date -u +%Y-%m-%d)"'
  seo-report-commit:
    command: 'printf "seo: analysis report %s\n" "$(date -u +%Y-%m-%d)"'
  gsc-data-path:
    command: "python scripts/fetch_gsc.py"
  posthog-data-path:
    command: "python scripts/fetch_posthog.py"
  indexing-results:
    command: 'propagate context get :changed-urls | python scripts/request_indexing.py'
  dataforseo-enrichment-path:
    command: "python scripts/fetch_dataforseo.py"
  seo-enrichment-commit:
    command: 'printf "seo: dataforseo enrichment %s\n" "$(date -u +%Y-%m-%d)"'
  seo-tracking-commit:
    command: 'printf "seo: track implementations %s\n" "$(date -u +%Y-%m-%d)"'
  seo-eval-commit:
    command: 'printf "seo: evaluate implementations %s\n" "$(date -u +%Y-%m-%d)"'
  evaluation-results:
    command: "python ${PROPAGATE_CONFIG_DIR}/scripts/evaluate_implementations.py"

signals:
  include:
    - includes/default.yaml
    - includes/github-signals.yaml
  start:
    payload:
      sender:
        type: string
        required: false

executions:
  pull-data:
    repository: pdfdancer-marketing-data
    signals: [ start ]
    git:
      branch:
        name: main
        base: main
        reuse: true
      commit:
        message_source: seo-data-commit
      push:
        remote: origin
    before:
      - git:branch
    sub_tasks:
      - id: install-deps
        before:
          - cp "${MARKETING_DATA_ENV:-.env}" .env
          - pip install -r requirements.txt
      - id: fetch-data
        before:
          - :gsc-data-path
          - :posthog-data-path
          - python scripts/fetch_page_content.py
      - id: summarize-pull
        prompt: ./prompts/seo/pull-data-summary.md
    after:
      - git:commit
      - git:push

  enrich-seo:
    repository: pdfdancer-marketing-data
    signals: [ enrich ]
    git:
      branch:
        name: main
        base: main
        reuse: true
      commit:
        message_source: seo-enrichment-commit
      push:
        remote: origin
    before:
      - git:branch
    sub_tasks:
      - id: install-deps
        before:
          - cp "${MARKETING_DATA_ENV:-.env}" .env
          - pip install -r requirements.txt
      - id: fetch-enrichment
        before:
          - :dataforseo-enrichment-path
      - id: summarize-enrichment
        prompt: ./prompts/seo/enrich-summary.md
    after:
      - git:commit
      - git:push

  evaluate-implementations:
    repository: pdfdancer-marketing-data
    git:
      branch:
        name: main
        base: main
        reuse: true
      commit:
        message_source: seo-eval-commit
      push:
        remote: origin
    before:
      - git:branch
    sub_tasks:
      - id: evaluate
        before:
          - :evaluation-results
    after:
      - git:commit
      - git:push

  analyze:
    repository: pdfdancer-marketing-data
    git:
      branch:
        name: main
        base: main
        reuse: true
      commit:
        message_source: seo-report-commit
      push:
        remote: origin
    before:
      - git:branch
    sub_tasks:
      - id: analyze
        prompt: ./prompts/seo/analyze.md
    after:
      - git:commit
      - git:push

  suggest:
    repository: pdfdancer-marketing-data
    git:
      branch:
        name_key: :suggest-branch-name
        base: main
      commit:
        message_source: commit_message
      push:
        remote: origin
      pr:
        base: main
        body_key: :summary
        number_key: :pr-number
    sub_tasks:
      - id: set-branch
        before:
          - 'propagate context set :suggest-branch-name "seo/suggestions-$(date -u +%Y-%m-%d)"'
      - id: create-branch
        before:
          - git:branch
      - id: code
        prompt: ./prompts/seo/suggest.md
      - id: summarize
        prompt: ./prompts/seo/summarize-suggest.md
      - id: publish
        before:
          - 'propagate context set :suggestions "$(cat "$(ls reports/*/suggestions.md | sort -r | head -1)")"'
          - git:commit
          - git:push
          - git:pr
      - id: wait-for-verdict
        before:
          - propagate context dump
        after:
          - git:pr-comments-list :review-comments
        wait_for_signal: pull_request.labeled
        routes:
          - when: { label: "changes_required" }
            goto: code
          - when: { label: "approved" }
            continue: true

  implement:
    repository: pdfdancer-www
    git:
      branch:
        name_key: :implement-branch-name
        base: main
      commit:
        message_source: commit_message
      push:
        remote: origin
      pr:
        base: main
        body_key: :implement-summary
        number_key: :implement-pr-number
    sub_tasks:
      - id: set-branch
        before:
          - 'propagate context set :implement-branch-name "seo/implement-$(date -u +%Y-%m-%d)"'
      - id: create-branch
        before:
          - git:branch
      - id: code
        prompt: ./prompts/seo/implement.md
      - id: summarize
        prompt: ./prompts/seo/summarize-implement.md
      - id: publish
        before:
          - 'propagate context set :applied-suggestions "$(propagate context get :suggestions --task suggest)"'
          - 'propagate context set :implement-summary "$(printf "%s\n\n---\n\n## Applied Suggestions\n\n%s" "$(propagate context get :implement-summary)" "$(propagate context get :applied-suggestions)")"'
          - git:commit
          - git:push
          - git:pr
      - id: wait-for-verdict
        after:
          - git:pr-comments-list :review-comments
        wait_for_signal: pull_request.labeled
        routes:
          - when: { label: "changes_required" }
            goto: code
          - when: { label: "approved" }
            continue: true

  track-implementations:
    repository: pdfdancer-marketing-data
    git:
      branch:
        name: main
        base: main
        reuse: true
      commit:
        message_source: seo-tracking-commit
      push:
        remote: origin
    before:
      - git:branch
    sub_tasks:
      - id: track
        prompt: ./prompts/seo/track-implementations.md
    after:
      - git:commit
      - git:push

  request-index:
    repository: pdfdancer-www
    sub_tasks:
      - id: request-indexing
        before:
          - :indexing-results
      - id: confirm
        prompt: ./prompts/seo/request-index.md

propagation:
  triggers:
    - after: pull-data
      run: evaluate-implementations
    - after: evaluate-implementations
      run: analyze
    - after: analyze
      run: suggest
    - after: suggest
      run: implement
    - after: implement
      run: track-implementations
    - after: track-implementations
      run: request-index
