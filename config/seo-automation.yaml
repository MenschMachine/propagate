# SEO Automation Pipeline for pdfdancer.com
#
# Main DAG (triggered by "start" signal):
#
#   pull-data → evaluate-implementations → intent-match → analyze → create-issues
#
# 1. pull-data:              Fetches GSC and PostHog data into
#                            pdfdancer-marketing-data/data/YYYY-MM-DD/, commits to main.
# 2. evaluate-implementations:
#                            Reads data/feedback/implementations.yaml, checks evaluation
#                            gates (14-day floor + volume threshold), scores mature entries
#                            using std dev noise check, writes results back to ledger.
#                            Sole owner of ledger evaluation writes. Commits to main.
# 3. intent-match:           Classifies query intent per page (Learning/Evaluating/
#                            Solving/Navigating), computes impression-weighted intent
#                            distributions, determines page stance, and assesses match
#                            quality. Writes intent-match report and saves :intent-match
#                            context for analyze. Commits to main.
# 4. analyze:                Reads the fetched data and the evaluated ledger (read-only).
#                            Writes an analysis report to reports/YYYY-MM-DD/ with an
#                            Implementation Effectiveness section. Commits to main.
#                            If enrichment data exists, includes competitor and keyword
#                            opportunity analysis.
# 5. create-issues:          For each non-deferred finding in :findings, creates a GitHub
#                            issue on pdfdancer-www (MenschMachine/pdfdancer-www) with
#                            the page path, diagnosis, evidence, and recommended action.
#                            Skips findings that already have an open or closed issue.
#
# Standalone execution (triggered by "enrich" signal):
#
#   enrich-seo
#
# enrich-seo:       Fetches DataForSEO competitor SERP data and related
#                    keyword opportunities for striking-distance keywords.
#                    Writes to data/enrichment/YYYY-MM-DD/, commits to main.
#                    Run weekly to keep API costs low (~$0.50/week).
#                    Usage: propagate run --config config/seo-automation.yaml --signal enrich
#
# Env vars needed:
#   GOOGLE_APPLICATION_CREDENTIALS  — service account JSON (GSC + Indexing)
#   POSTHOG_API_KEY                 — PostHog personal API key
#   POSTHOG_PROJECT_ID              — PostHog project ID
#   DATAFORSEO_LOGIN / DATAFORSEO_PASSWORD — DataForSEO API credentials
#   DATAFORSEO_SERP_LIMIT — Max SERP lookups per run (default: 50)
#   DATAFORSEO_SEED_LIMIT — Max related keyword seeds (default: 20)
#   MARKETING_DATA_ENV    — Path to marketing-data .env file (default: .env in working dir)

version: "6"

agent:
  command: 'select-best-agent.sh "Read the file {prompt_file} and follow its instructions."'

repositories:
  pdfdancer-marketing-data:
    url: git@github.com:MenschMachine/pdfdancer-marketing-data.git
  pdfdancer-www:
    url: git@github.com:MenschMachine/pdfdancer-www.git

context_sources:
  seo-data-commit:
    command: 'printf "seo: data pull %s\n" "$(date -u +%Y-%m-%d)"'
  seo-report-commit:
    command: 'printf "seo: analysis report %s\n" "$(date -u +%Y-%m-%d)"'
  gsc-data-path:
    command: "python scripts/fetch_gsc.py"
  posthog-data-path:
    command: "python scripts/fetch_posthog.py"
  dataforseo-enrichment-path:
    command: "python scripts/fetch_dataforseo.py"
  seo-enrichment-commit:
    command: 'printf "seo: dataforseo enrichment %s\n" "$(date -u +%Y-%m-%d)"'
  seo-eval-commit:
    command: 'printf "seo: evaluate implementations %s\n" "$(date -u +%Y-%m-%d)"'
  seo-intent-commit:
    command: 'printf "seo: intent-match analysis %s\n" "$(date -u +%Y-%m-%d)"'
  evaluation-results:
    command: "python ${PROPAGATE_CONFIG_DIR}/scripts/evaluate_implementations.py"

signals:
  include:
    - signals/default.yaml
    - signals/github-signals.yaml
  start:
    payload:
      sender:
        type: string
        required: false

executions:
  include:
    - executions/seo/pull-data.yaml
    - executions/seo/enrich-seo.yaml
    - executions/seo/evaluate-implementations.yaml
    - executions/seo/intent-match.yaml
    - executions/seo/analyze.yaml
    - executions/seo/create-issues.yaml

propagation:
  triggers:
    - after: pull-data
      run: evaluate-implementations
    - after: evaluate-implementations
      run: intent-match
    - after: intent-match
      run: analyze
    - after: analyze
      run: create-issues
