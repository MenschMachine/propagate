# SEO Automation Pipeline for pdfdancer.com
#
# Main DAG (triggered by "start" signal):
#
#   pull-data → analyze → suggest → implement → request-index
#
# 1. pull-data:      Fetches GSC and PostHog data into
#                    pdfdancer-marketing-data/data/YYYY-MM-DD/, commits to main.
# 2. analyze:        Reads the fetched data and writes an analysis report to
#                    reports/YYYY-MM-DD/ (bounce rates, traffic sources),
#                    commits to main. If enrichment data exists, includes
#                    competitor and keyword opportunity analysis.
# 3. suggest:        Opens a PR on pdfdancer-marketing-data with concrete SEO
#                    recommendations. Waits for a label: "approved" continues,
#                    "changes_required" loops back to revise.
# 4. implement:      Switches to the pdfdancer-www repo.
#                    Reads the approved suggestions from the marketing-data
#                    context and applies them — editing page metadata, titles,
#                    headings, internal links, or content. Opens a PR on
#                    pdfdancer-www with the same label-based review loop.
# 5. request-index:  Runs in the pdfdancer-www repo after implement merges.
#                    Reads the list of changed URL paths from context and
#                    submits them to the Google Indexing API so crawlers
#                    pick up the changes quickly.
#
# Standalone execution (triggered by "enrich" signal):
#
#   enrich-seo
#
# enrich-seo:       Fetches DataForSEO competitor SERP data and related
#                    keyword opportunities for striking-distance keywords.
#                    Writes to data/enrichment/YYYY-MM-DD/, commits to main.
#                    Run weekly to keep API costs low (~$0.50/week).
#                    Usage: propagate run --config config/seo-automation.yaml --signal enrich
#
# Env vars needed:
#   GOOGLE_APPLICATION_CREDENTIALS  — service account JSON (GSC + Indexing)
#   POSTHOG_API_KEY                 — PostHog personal API key
#   POSTHOG_PROJECT_ID              — PostHog project ID
#   DATAFORSEO_LOGIN / DATAFORSEO_PASSWORD — DataForSEO API credentials
#   DATAFORSEO_SERP_LIMIT — Max SERP lookups per run (default: 50)
#   DATAFORSEO_SEED_LIMIT — Max related keyword seeds (default: 20)

version: "6"

agent:
  command: 'codex exec --dangerously-bypass-approvals-and-sandbox "Read the file {prompt_file} and follow its instructions."'

repositories:
  pdfdancer-marketing-data:
    url: git@github.com:MenschMachine/pdfdancer-marketing-data.git
  pdfdancer-www:
    url: git@github.com:MenschMachine/pdfdancer-www.git

context_sources:
  commit_message:
    command: gommit -A -n -I
  seo-data-commit:
    command: 'printf "seo: data pull %s\n" "$(date -u +%Y-%m-%d)"'
  seo-report-commit:
    command: 'printf "seo: analysis report %s\n" "$(date -u +%Y-%m-%d)"'
  gsc-data-path:
    command: "python scripts/fetch_gsc.py"
  posthog-data-path:
    command: "python scripts/fetch_posthog.py"
  indexing-results:
    command: 'propagate context get :changed-urls | python scripts/request_indexing.py'
  dataforseo-enrichment-path:
    command: "python scripts/fetch_dataforseo.py"
  seo-enrichment-commit:
    command: 'printf "seo: dataforseo enrichment %s\n" "$(date -u +%Y-%m-%d)"'

signals:
  include:
    - includes/default.yaml
    - includes/github-signals.yaml

executions:
  pull-data:
    repository: pdfdancer-marketing-data
    signals: [start]
    git:
      branch:
        name: main
        base: main
        reuse: true
      commit:
        message_source: seo-data-commit
      push:
        remote: origin
    before:
      - git:branch
    sub_tasks:
      - id: install-deps
        before:
          - cp /Users/michael/Code/TFC/pdfdancer/pdfdancer-marketing-data/.env .env
          - pip install -r requirements.txt
      - id: fetch-data
        before:
          - :gsc-data-path
          - :posthog-data-path
      - id: summarize-pull
        prompt: ./prompts/seo/pull-data-summary.md
    after:
      - git:commit
      - git:push

  enrich-seo:
    repository: pdfdancer-marketing-data
    signals: [enrich]
    git:
      branch:
        name: main
        base: main
        reuse: true
      commit:
        message_source: seo-enrichment-commit
      push:
        remote: origin
    before:
      - git:branch
    sub_tasks:
      - id: install-deps
        before:
          - cp /Users/michael/Code/TFC/pdfdancer/pdfdancer-marketing-data/.env .env
          - pip install -r requirements.txt
      - id: fetch-enrichment
        before:
          - :dataforseo-enrichment-path
      - id: summarize-enrichment
        prompt: ./prompts/seo/enrich-summary.md
    after:
      - git:commit
      - git:push

  analyze:
    repository: pdfdancer-marketing-data
    git:
      branch:
        name: main
        base: main
        reuse: true
      commit:
        message_source: seo-report-commit
      push:
        remote: origin
    before:
      - git:branch
    sub_tasks:
      - id: analyze
        prompt: ./prompts/seo/analyze.md
    after:
      - git:commit
      - git:push

  suggest:
    repository: pdfdancer-marketing-data
    git:
      branch:
        name_key: :suggest-branch-name
        base: main
      commit:
        message_source: commit_message
      push:
        remote: origin
      pr:
        base: main
        body_key: :summary
        number_key: :pr-number
    sub_tasks:
      - id: set-branch
        before:
          - 'propagate context set :suggest-branch-name "seo/suggestions-$(date -u +%Y-%m-%d)"'
      - id: create-branch
        before:
          - git:branch
      - id: code
        prompt: ./prompts/seo/suggest.md
      - id: summarize
        prompt: ./prompts/seo/summarize-suggest.md
      - id: publish
        before:
          - git:commit
          - git:push
          - git:pr
      - id: wait-for-verdict
        before:
          - propagate context dump
        wait_for_signal: pull_request.labeled
        routes:
          - when: { label: "changes_required" }
            goto: code
          - when: { label: "approved" }
            continue: true

  implement:
    repository: pdfdancer-www
    git:
      branch:
        name_key: :implement-branch-name
        base: main
      commit:
        message_source: commit_message
      push:
        remote: origin
      pr:
        base: main
        body_key: :implement-summary
        number_key: :implement-pr-number
    sub_tasks:
      - id: set-branch
        before:
          - 'propagate context set :implement-branch-name "seo/implement-$(date -u +%Y-%m-%d)"'
      - id: create-branch
        before:
          - git:branch
      - id: code
        prompt: ./prompts/seo/implement.md
      - id: summarize
        prompt: ./prompts/seo/summarize-implement.md
      - id: publish
        before:
          - git:commit
          - git:push
          - git:pr
      - id: wait-for-verdict
        wait_for_signal: pull_request.labeled
        routes:
          - when: { label: "changes_required" }
            goto: code
          - when: { label: "approved" }
            continue: true

  request-index:
    repository: pdfdancer-www
    sub_tasks:
      - id: request-indexing
        before:
          - :indexing-results
      - id: confirm
        prompt: ./prompts/seo/request-index.md

propagation:
  triggers:
    - after: pull-data
      run: analyze
    - after: analyze
      run: suggest
    - after: suggest
      run: implement
    - after: implement
      run: request-index
