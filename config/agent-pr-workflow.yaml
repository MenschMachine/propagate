# Agent-driven implement → review → revise workflow.
#
# Triggered by the "start" signal with an "instructions" payload describing what to build.
#
# Sub-task flow:
#   generate-branch-name  → read {:signal.instructions}, output a git-safe branch name to :branch-name
#   create-branch         → git:branch using the dynamic :branch-name
#   code                  → implement changes based on {:signal.instructions}
#   summarize             → diff → write summary to :summary
#   publish               → git:commit, git:push, git:pr (PR body from :summary, PR number stored in :pr-number)
#   review                → review the diff, save review to :review-body
#   post-review           → git:pr-comment-add :review-body
#   wait-for-verdict      → block on pull_request.labeled signal:
#                             label "changes_required" → goto code (loop: re-implement through post-review)
#                             label "approved"         → continue (execution completes)
#
# The loop re-runs code → summarize → publish → review → post-review on each iteration.
# git:pr handles "PR already exists" gracefully — it skips creation and returns the existing URL.
#
# Requires `propagate serve` for the signal-gated wait at wait-for-verdict.

version: "6"

agent:
  command: "codex exec --dangerously-bypass-approvals-and-sandbox 'Read the file {prompt_file} and follow its instructions.'"

repositories:
  test-propagation-backend:
    url: git@github.com:MenschMachine/test-propagation-backend.git

context_sources:
  commit_message:
    command: gommit -A -n -I

signals:
  include:
    - includes/default.yaml
    - includes/github-signals.yaml

executions:
  implement:
    repository: test-propagation-backend
    signals: [start]
    git:
      branch:
        name_key: :branch-name
        base: main
      commit:
        message_source: commit_message
      push:
        remote: origin
      pr:
        base: main
        body_key: :summary
        number_key: :pr-number
    sub_tasks:
      - id: generate-branch-name
        prompt: ./prompts/agent-pr/generate-branch-name.md
      - id: create-branch
        before:
          - git:branch
      - id: code
        prompt: ./prompts/agent-pr/implement.md
      - id: summarize
        prompt: ./prompts/agent-pr/summarize.md
      - id: publish
        before:
          - git:commit
          - git:push
          - git:pr
      - id: review
        prompt: ./prompts/agent-pr/review.md
      - id: post-review
        before:
          - "git:pr-comment-add :review-body"
      - id: wait-for-verdict
        wait_for_signal: pull_request.labeled
        routes:
          - when: { label: "changes_required" }
            goto: code
          - when: { label: "approved" }
            continue: true
