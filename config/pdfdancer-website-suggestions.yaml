# Website suggestion workflow for pdfdancer.
#
# Trigger 1:
#   pull_request.labeled on MenschMachine/pdfdancer-backend with label suggestions_needed
#   -> inspect the backend PR, implement the dependent api-docs changes, and open a PR
#
# Trigger 2:
#   approved label on the generated pdfdancer-api-docs PR
#   -> validate it is the PR from Trigger 1, then implement the dependent website changes
#
# Typical setup:
#   propagate serve --config config/pdfdancer-website-suggestions.yaml
#   propagate-webhook --port 8080 --secret-env GITHUB_WEBHOOK_SECRET
#   scripts/propagate-prod-setup.py --config config/pdfdancer-website-suggestions.yaml --url https://your-host/webhook

version: "6"

agent:
  command: 'codex exec --dangerously-bypass-approvals-and-sandbox "Read the file {prompt_file} and follow its instructions."'

repositories:
  pdfdancer-backend:
    url: git@github.com:MenschMachine/pdfdancer-backend.git
  pdfdancer-api-docs:
    url: git@github.com:MenschMachine/pdfdancer-api-docs.git
  pdfdancer-www:
    url: git@github.com:MenschMachine/pdfdancer-www.git

signals:
  include:
    - signals/default.yaml
    - signals/github-signals.yaml

executions:
  implement-approved-api-docs-updates:
    repository: pdfdancer-api-docs
    signals:
      - signal: pull_request.labeled
        when:
          repository: MenschMachine/pdfdancer-backend
          label: suggestions_needed
    before:
      - 'propagate context set :source-backend-pr-number "$(propagate context get :signal.pr_number | xargs)"'
    git:
      branch:
        name_template: "api-docs/backend-pr-{signal[pr_number]}"
        base: main
      commit:
        message_template: "api-docs: document backend PR #{context[:source-backend-pr-number]}"
      push:
        remote: origin
      pr:
        base: main
        body_key: :api-docs-pr-body
        number_key: :api-docs-pr-number
    sub_tasks:
      - id: validate-backend-pr
        prompt: ./prompts/pdfdancer/validate-backend-pr-suggestions.md
      - id: implement
        before:
          - git:branch
        prompt: ./prompts/pdfdancer/implement-api-docs-from-backend-pr.md
      - id: summarize
        prompt: ./prompts/pdfdancer/summarize-api-docs-from-backend-pr.md
      - id: wait-for-verdict
        before:
          - git:publish
        wait_for_signal: pull_request.labeled
        routes:
          - when:
              repository: MenschMachine/pdfdancer-api-docs
              label: approved
            continue: true
      - id: validate-approved-api-docs-pr
        before:
          - '[ "$(propagate context get :signal.repository | xargs)" = "MenschMachine/pdfdancer-api-docs" ]'
          - '[ "$(propagate context get :signal.label | xargs)" = "approved" ]'
          - '[ "$(propagate context get :signal.pr_number | xargs)" = "$(propagate context get :api-docs-pr-number | xargs)" ]'

  implement-approved-website-updates:
    repository: pdfdancer-www
    git:
      branch:
        name_template: "website/backend-pr-{context[implement-approved-api-docs-updates][:source-backend-pr-number]}"
        base: main
      commit:
        message_template: "website: reflect backend PR #{context[implement-approved-api-docs-updates][:source-backend-pr-number]}"
      push:
        remote: origin
      pr:
        base: main
        body_key: :website-pr-body
        number_key: :website-pr-number
    sub_tasks:
      - id: validate-context
        prompt: ./prompts/pdfdancer/validate-website-follow-up-context.md
      - id: implement
        before:
          - git:branch
        prompt: ./prompts/pdfdancer/implement-website-from-backend-pr.md
      - id: summarize
        prompt: ./prompts/pdfdancer/summarize-website-from-backend-pr.md
    after:
      - git:publish

propagation:
  triggers:
    - after: implement-approved-api-docs-updates
      run: implement-approved-website-updates
