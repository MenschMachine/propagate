# Use schema version 6 because this bundle targets the current stage-6 runtime.
version: "6"

# The agent block tells Propagate which shell command should receive each rendered prompt.
agent:
  # This demo command is intentionally safe: it writes the final prompt into
  # PROPAGATE_EXAMPLE_OUTPUT.md in the current working directory instead of
  # calling a real LLM. Replace it with your actual agent command when adapting
  # the example for a real project.
  command: 'python3 -c "import sys; from pathlib import Path; prompt = Path(sys.argv[1]).read_text(encoding=\"utf-8\"); Path(\"PROPAGATE_EXAMPLE_OUTPUT.md\").write_text(prompt, encoding=\"utf-8\")" {prompt_file}'

# Repositories are named working directories that executions can route into.
repositories:
  # This repository stands in for the codebase that emitted the triggering change.
  core-api:
    # Paths are resolved relative to this config file.
    path: ./repos/core-api
  # This repository stands in for the downstream docs site that reacts to the change.
  docs-site:
    # Keeping the path inside the bundle makes the example self-contained.
    path: ./repos/docs-site

# Context sources are shell commands that hooks can load into reserved :keys.
context_sources:
  # This source turns the incoming signal payload into a human-readable summary.
  change-summary:
    # The command runs in the execution working directory after :signal.* files
    # have been written there, so it can read the signal context directly.
    command: 'printf "Branch: %s\nUrgent: %s\nRelease: %s\nFiles:\n%s\nStats:\n%s\nNote:\n%s\n" "$(cat .propagate-context/:signal.branch)" "$(cat .propagate-context/:signal.urgent)" "$(cat .propagate-context/:signal.release)" "$(cat .propagate-context/:signal.files)" "$(cat .propagate-context/:signal.stats)" "$(cat .propagate-context/:signal.note)"'
  # This source creates a short handoff note after the first local sub-task.
  announcement-note:
    # Later sub-tasks in the same execution will see the reserved :announcement-note key.
    command: 'printf "Next step: activate the docs update DAG.\nSignal source: %s\n" "$(cat .propagate-context/:signal.source)"'
  # This source gives the routed core-api execution a repo-specific note.
  core-change-note:
    # It shows that context sources work the same way inside repository-routed executions.
    command: 'printf "Inspect the core change on branch %s and capture whatever the docs site needs.\n" "$(cat .propagate-context/:signal.branch)"'
  # This source provides a lightweight outline for the docs update execution.
  docs-outline:
    # The command intentionally stays simple so the example focuses on orchestration, not content generation.
    command: 'printf "Update the docs landing page.\nSummarize the changed files.\nRecord the release number from the signal.\n"'
  # This source creates a review checklist after the docs update completes.
  review-focus:
    # review-docs loads it in a before hook so the prompt shows how downstream context accumulates.
    command: 'printf "Review the generated prompt output for branch %s.\nConfirm the signal context is still attached.\n" "$(cat .propagate-context/:signal.branch)"'
  # This source generates a commit message for the publish-docs git execution.
  docs-publish-commit:
    # message_source commits are resolved by running this context source at publish time.
    command: 'printf "docs(example): publish docs for %s\n\nGenerated by the stage-6 example bundle.\n" "$(cat .propagate-context/:signal.branch)"'
  # This source gives the publish-docs prompt an explicit checklist before git automation runs.
  publish-checklist:
    # It exists to show that ordinary context loading and git automation can be combined in one execution.
    command: 'printf "Make sure docs output is ready.\nPush the branch only after the prompt output looks correct.\n"'

# Signals define the event types that can start a run and gate propagation triggers.
signals:
  # This example models a generic repository change event.
  repo-change:
    # The payload schema is a map of allowed fields and their expected types.
    payload:
      # branch is required because most downstream work references it.
      branch:
        # string accepts plain text values.
        type: string
        # required enforces that the field must be present at run start.
        required: true
      # files demonstrates the list type.
      files:
        # list accepts any YAML or JSON sequence.
        type: list
        # This field is required so the example always has something to summarize.
        required: true
      # urgent demonstrates boolean signal validation.
      urgent:
        # boolean accepts true or false.
        type: boolean
      # stats demonstrates a structured mapping payload.
      stats:
        # mapping accepts YAML or JSON objects.
        type: mapping
      # release demonstrates numeric payload validation.
      release:
        # number accepts integers and floats, but not booleans.
        type: number
      # note demonstrates the permissive any type.
      note:
        # any accepts whatever YAML value the caller provides.
        type: any

# Executions define the units of work that the scheduler can activate.
executions:
  # triage-change is the only execution that explicitly accepts the repo-change signal.
  triage-change:
    # Listing the signal here allows Propagate to auto-select this execution on signal-only runs.
    signals:
      # A run with --signal-file ../signals/repo-change.yaml lands here first.
      - repo-change
    # Sub-tasks run sequentially inside one execution.
    sub_tasks:
      # The first sub-task reads a context source before the prompt is rendered.
      - id: triage
        # Prompts are resolved relative to the config file.
        prompt: ./prompts/triage-change.md
        # before hooks run before the prompt is assembled and the agent is called.
        before:
          # :change-summary runs the matching context source and stores its stdout under :change-summary.
          - :change-summary
        # after hooks run only after the agent command succeeds.
        after:
          # :announcement-note becomes available to later sub-tasks in this same execution.
          - :announcement-note
        # on_failure hooks run if the before hook or agent command fails for this sub-task.
        on_failure:
          # This shell hook leaves a simple marker in local context for debugging.
          - 'mkdir -p .propagate-context && printf ''triage failed\n'' > .propagate-context/triage_failure'
      # The second sub-task sees both the signal context and the earlier after-hook output.
      - id: announce
        # This prompt exists mainly to show how context accumulates within one execution.
        prompt: ./prompts/announce-plan.md
        # before hooks can also be ordinary shell commands instead of context source loads.
        before:
          # This writes a non-reserved local key that will be appended to the prompt.
          - 'mkdir -p .propagate-context && printf ''ready to fan out\n'' > .propagate-context/handoff_status'
        # on_failure hooks are optional per sub-task.
        on_failure:
          # The example keeps failure handling minimal and visible.
          - 'mkdir -p .propagate-context && printf ''announce failed\n'' > .propagate-context/announce_failure'

  # prepare-core-context runs in the core-api repository before docs work starts.
  prepare-core-context:
    # repository reroutes this execution into repositories.core-api.path.
    repository: core-api
    # A single prompt is enough to demonstrate repository routing.
    sub_tasks:
      # This sub-task simulates inspecting the upstream codebase.
      - id: inspect-core
        # The prompt explains what a real agent would do here.
        prompt: ./prompts/prepare-core-context.md
        # before hooks still run inside the repository-local working directory.
        before:
          # The reserved key lands in repos/core-api/.propagate-context/:core-change-note.
          - :core-change-note

  # lint-docs is a second dependency that fans into update-docs.
  lint-docs:
    # This one also runs in the docs repository.
    repository: docs-site
    # It has no dependencies so it can run as soon as it is activated.
    sub_tasks:
      # The prompt stands in for a docs lint or validation step.
      - id: lint
        # Keeping it separate makes the fan-in behavior easier to see.
        prompt: ./prompts/lint-docs.md

  # update-docs waits for both prepare-core-context and lint-docs.
  update-docs:
    # It edits the downstream docs repository.
    repository: docs-site
    # depends_on creates the fan-in portion of the DAG.
    depends_on:
      # update-docs cannot run until prepare-core-context completes.
      - prepare-core-context
      # update-docs also waits for lint-docs.
      - lint-docs
    # This execution is intentionally non-git so the signal-driven DAG can be tried without git setup.
    sub_tasks:
      # The prompt represents the main docs update work.
      - id: write-docs
        # A real agent would edit docs files here.
        prompt: ./prompts/update-docs.md
        # before hooks can load additional helper context.
        before:
          # :docs-outline gives the prompt a structured to-do list.
          - :docs-outline
        # after hooks can prepare downstream executions in the same repository.
        after:
          # review-docs will reuse this reserved key later.
          - :review-focus
        # Failures can leave behind a visible marker for operators.
        on_failure:
          # This demonstrates an ordinary shell cleanup path.
          - 'printf ''update-docs failed\n'' > UPDATE_DOCS_FAILURE.txt'

  # review-docs is both a manual entry point and a propagation target.
  review-docs:
    # It runs in the same docs repository so it reuses that repository-local context bag.
    repository: docs-site
    # The explicit dependency makes manual runs of review-docs pull the full docs path first.
    depends_on:
      # review-docs only makes sense after update-docs finishes.
      - update-docs
    # review-docs stays non-git so it can seed later git executions.
    sub_tasks:
      # This sub-task reviews the previous prompt output instead of publishing anything yet.
      - id: review
        # The prompt explains the intended checkpoint.
        prompt: ./prompts/review-docs.md
        # before hooks load the checklist created for the reviewer.
        before:
          # review-focus was also available from update-docs.after, but loading it here keeps the example explicit.
          - :review-focus
        # after hooks can prepare reserved context for future executions.
        after:
          # archive-review uses this reserved key as git.commit.message_key.
          - 'mkdir -p .propagate-context && printf ''docs(example): archive review notes\n\nCreated by the review-docs after hook.\n'' > .propagate-context/:archive-commit-message'
        # on_failure gives the repo a visible breadcrumb if review fails.
        on_failure:
          # The file lands in repos/docs-site because that is this execution's working directory.
          - 'printf ''review-docs failed\n'' > REVIEW_DOCS_FAILURE.txt'

  # archive-review is a manual git example that uses a reserved context key for the commit message.
  archive-review:
    # It also targets the docs repository.
    repository: docs-site
    # The dependency guarantees review-docs runs first and prepares :archive-commit-message.
    depends_on:
      # This lets one manual run show both dependency activation and git automation.
      - review-docs
    # This execution keeps the git demo local by omitting push and PR creation.
    git:
      # branch controls the checkout Propagate prepares before sub-tasks run.
      branch:
        # A fixed branch name keeps the example easy to inspect.
        name: propagate/example-archive-review
        # base selects the ref used when the branch does not already exist.
        base: main
        # reuse allows repeated demo runs to reuse the existing branch.
        reuse: true
      # commit controls how Propagate creates a commit after the sub-task changes files.
      commit:
        # message_key reads a reserved context entry from the working directory.
        message_key: :archive-commit-message
    # The prompt simulates recording review notes.
    sub_tasks:
      # The agent output file gives git something deterministic to commit.
      - id: archive
        # The prompt calls out the message_key behavior explicitly.
        prompt: ./prompts/archive-review.md

  # publish-docs is a second manual git example that uses message_source plus push and PR steps.
  publish-docs:
    # It runs in docs-site because that is the repo we are pretending to publish.
    repository: docs-site
    # The dependency ensures the review path is complete before publish begins.
    depends_on:
      # Manual runs of publish-docs therefore activate update-docs and review-docs first.
      - review-docs
    # This is the most feature-complete git block in the bundle.
    git:
      # branch setup happens before the prompt runs.
      branch:
        # The branch name is explicit so repeated demo runs are predictable.
        name: propagate/example-publish-docs
        # base tells Propagate which ref to branch from when creating it.
        base: main
        # reuse makes reruns idempotent as long as the branch already exists locally.
        reuse: true
      # commit generation comes after the sub-task produces file changes.
      commit:
        # message_source runs context_sources.docs-publish-commit at publish time.
        message_source: docs-publish-commit
      # push is optional, but included here to show the full stage-4/stage-6 git path.
      push:
        # remote is passed directly to git push --set-upstream.
        remote: origin
      # pr is optional and only valid when push is configured.
      pr:
        # base selects the target branch for gh pr create.
        base: main
        # draft lets the example show the draft PR toggle.
        draft: true
    # The publish prompt demonstrates that ordinary hooks still work in git executions.
    sub_tasks:
      # This sub-task writes the prompt output that Propagate will commit and publish.
      - id: publish
        # A real project would replace this with an agent that edits release or deployment files.
        prompt: ./prompts/publish-docs.md
        # before hooks can still enrich prompt context before git automation runs.
        before:
          # publish-checklist becomes visible in the rendered prompt.
          - :publish-checklist

# propagation wires the DAG edges between completed executions.
propagation:
  # triggers is the ordered list of follow-on activation rules.
  triggers:
    # When the signal-driven local triage completes, activate the docs DAG.
    - after: triage-change
      # on_signal restricts this rule to runs started by repo-change.
      on_signal: repo-change
      # run names the downstream execution to activate.
      run: update-docs
    # Once docs are updated, always schedule a review step.
    - after: update-docs
      # Omitting on_signal makes this trigger unconditional.
      run: review-docs
