version: "6"

agent:
  command: 'codex exec --dangerously-bypass-approvals-and-sandbox "Read the file {prompt_file} in this directory and follow its instructions."'

context_sources:
  commit_message:
    command: 'gommit -A -f -n -I'


executions:
    git:
      branch:
        name: propagate/example-config
        base: main
        reuse: true
      commit:
        message_source: commit_message
    sub_tasks:
      - id: implement
        prompt: ./prompts/create-example-config.md
