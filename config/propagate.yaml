version: "2"

agent:
  command: 'codex exec --dangerously-bypass-approvals-and-sandbox "Read the file {prompt_file} in this directory and follow its instructions."'

executions:
  build-stage3:
    sub_tasks:
      - id: design
        prompt: ./prompts/design-stage3.md
      - id: implementation
        prompt: ./prompts/implement-stage3.md
      - id: review
        prompt: ./prompts/review-stage3.md
