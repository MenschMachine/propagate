version: "6"

agent:
  command: 'codex exec --dangerously-bypass-approvals-and-sandbox "Read the file {prompt_file} and follow its instructions."'

repositories:
  propagate:
    path: ..

context_sources:
  commit_message:
    command: 'gommit -A -n -I'


executions:
  example_config:
    repository: propagate
    git:
      branch:
        name: propagate/example-config
        base: main
        reuse: true
      commit:
        message_source: commit_message
    sub_tasks:
      - id: implement
        prompt: ./prompts/create-example-config.md
  refactor:
    repository: propagate
    git:
      branch:
        name: refactor
        base: main
        reuse: true
      commit:
        message_source: commit_message
    sub_tasks:
      - id: refactor
        prompt: ./prompts/refactor-propagate-py.md
