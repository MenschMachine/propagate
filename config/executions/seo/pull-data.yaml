pull-data:
  repository: pdfdancer-marketing-data
  signals: [ start ]
  git:
    branch:
      name: main
      base: main
      reuse: true
    commit:
      message_source: seo-data-commit
    push:
      remote: origin
  before:
    - git:branch
  sub_tasks:
    - id: install-deps
      before:
        - cp "${MARKETING_DATA_ENV:-.env}" .env
        - pip install -r requirements.txt
    - id: fetch-data
      before:
        - :gsc-data-path
        - :posthog-data-path
        - python scripts/fetch_page_content.py
    - id: summarize-pull
      prompt: ./prompts/seo/pull-data-summary.md
  after:
    - git:commit
    - git:push
