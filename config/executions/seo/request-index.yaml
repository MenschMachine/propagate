request-index:
  repository: pdfdancer-www
  sub_tasks:
    - id: wait-for-deploy
      wait_for_signal: push
      routes:
        - when: { ref: "refs/heads/main" }
          continue: true
    - id: request-indexing
      before:
        - "sleep 600"
        - :indexing-results
    - id: confirm
      prompt: ./prompts/seo/request-index.md
