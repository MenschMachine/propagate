intent-match:
  repository: pdfdancer-marketing-data
  git:
    branch:
      name: main
      base: main
      reuse: true
    commit:
      message_source: seo-intent-commit
    push:
      remote: origin
  before:
    - git:branch
  sub_tasks:
    - id: intent-match
      prompt: ./prompts/seo/intent-match.md
  after:
    - git:commit
    - git:push
