evaluate-implementations:
  repository: pdfdancer-marketing-data
  git:
    branch:
      name: main
      base: main
      reuse: true
    commit:
      message_source: seo-eval-commit
    push:
      remote: origin
  before:
    - git:branch
  sub_tasks:
    - id: evaluate
      before:
        - :evaluation-results
  after:
    - git:commit
    - git:push
