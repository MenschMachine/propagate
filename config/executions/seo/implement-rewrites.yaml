implement-rewrites:
  repository: pdfdancer-www
  git:
    branch:
      name_key: :implement-rewrites-branch-name
      base: main
    commit:
      message_source: commit_message
    push:
      remote: origin
    pr:
      base: main
      body_key: :implement-rewrites-summary
      number_key: :implement-rewrites-pr-number
  sub_tasks:
    - id: set-branch
      before:
        - 'propagate context set :implement-rewrites-branch-name "seo/implement-rewrites-$(date -u +%Y-%m-%d)"'
    - id: create-branch
      before:
        - git:branch
    - id: code
      before:
        - 'propagate context delete :needs-rewrite-briefs'
        - 'propagate context delete :rewrite-briefs-refined'
        - 'propagate context delete :checks-passed'
      prompt: ./prompts/seo/implement-rewrites.md
      must_set:
        - ":changed-urls-rewrites"
    - id: review
      before:
        - 'propagate context delete :review-findings'
        - 'propagate context delete :review-suggestions'
        - 'propagate context delete :review-findings-brief'
      prompt: ./prompts/seo/review-implement-rewrites.md
    - id: reroute-on-implementation-findings
      when: ":review-findings"
      after:
        - 'propagate context set :revision-reason review-findings'
      goto: code
      max_goto: 5
    - id: flag-brief-problem
      when: ":review-findings-brief"
      after:
        - 'propagate context set :needs-rewrite-briefs true'
    - id: revise-briefs
      when: ":needs-rewrite-briefs"
      prompt: ./prompts/seo/revise-briefs-rewrites.md
      must_set:
        - ":active-rewrite-briefs"
        - ":rewrite-briefs-refined"
    - id: reroute-after-brief-revision
      when: ":rewrite-briefs-refined"
      goto: code
      max_goto: 5
    - id: summarize
      prompt: ./prompts/seo/summarize-implement-rewrites.md
      must_set:
        - ":implement-rewrites-summary"
    - id: publish
      before:
        - 'if propagate context get :active-rewrite-briefs >/dev/null 2>&1; then propagate context set :applied-rewrite-briefs "$(propagate context get :active-rewrite-briefs)"; else propagate context set :applied-rewrite-briefs "$(propagate context get :rewrite-briefs --task brief-rewrites)"; fi'
        - 'propagate context set :implement-rewrites-summary "$(printf "%s\n\n---\n\n## Applied Rewrite Briefs\n\n%s" "$(propagate context get :implement-rewrites-summary)" "$(propagate context get :applied-rewrite-briefs)")"'
        - git:commit
        - git:push
        - git:pr
    - id: wait-for-checks
      before:
        - git:pr-checks-wait :implement-check-results :checks-passed 10 1800
    - id: reroute-on-check-failure
      when: "!:checks-passed"
      after:
        - 'propagate context set :revision-reason check-failure'
      goto: code
      max_goto: 5
    - id: wait-for-verdict
      after:
        - git:pr-comments-list :pr-comments
      wait_for_signal: pull_request.labeled
      routes:
        - when:
            label: "changes_required"
            pr_number:
              equals_context: ":implement-rewrites-pr-number"
          goto: code
        - when:
            label: "approved"
            pr_number:
              equals_context: ":implement-rewrites-pr-number"
          continue: true
    - id: route-after-approval
      before:
        - 'if propagate context get :has-new-content-targets --task plan-seo >/dev/null 2>&1; then propagate context set :run-new-content-after-rewrites true; else propagate context set :ready-to-track true; fi'
