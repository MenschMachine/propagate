brief-rewrites:
  repository: pdfdancer-marketing-data
  git:
    branch:
      name_key: :brief-rewrites-branch-name
      base: main
    commit:
      message_source: commit_message
    push:
      remote: origin
    pr:
      base: main
      body_key: :brief-rewrites-summary
      number_key: :brief-rewrites-pr-number
  sub_tasks:
    - id: set-branch
      before:
        - 'propagate context set :brief-rewrites-branch-name "seo/brief-rewrites-$(date -u +%Y-%m-%d)"'
    - id: create-branch
      before:
        - git:branch
    - id: brief
      before:
        - 'propagate context delete :rewrite-briefs'
        - 'propagate context delete :rewrite-briefs-path'
      prompt: ./prompts/seo/brief-rewrites.md
      must_set:
        - ":rewrite-briefs-path"
        - ":rewrite-briefs"
    - id: review-briefs
      before:
        - 'propagate context delete :review-findings'
        - 'propagate context delete :review-suggestions'
      prompt: ./prompts/seo/review-briefs-rewrites.md
    - id: reroute-on-review-findings
      when: ":review-findings"
      after:
        - 'propagate context set :revision-reason review-findings'
      goto: brief
      max_goto: 5
    - id: summarize
      prompt: ./prompts/seo/summarize-brief-rewrites.md
      must_set:
        - ":brief-rewrites-summary"
    - id: publish
      before:
        - git:commit
        - git:push
        - git:pr
    - id: wait-for-verdict
      after:
        - git:pr-comments-list :pr-comments
      wait_for_signal: pull_request.labeled
      routes:
        - when:
            label: "changes_required"
            pr_number:
              equals_context: ":brief-rewrites-pr-number"
          goto: brief
        - when:
            label: "approved"
            pr_number:
              equals_context: ":brief-rewrites-pr-number"
          continue: true
