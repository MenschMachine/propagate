track-implementations:
  repository: pdfdancer-marketing-data
  git:
    branch:
      name: main
      base: main
      reuse: true
    commit:
      message_source: seo-tracking-commit
    push:
      remote: origin
  before:
    - git:branch
  sub_tasks:
    - id: track
      prompt: ./prompts/seo/track-implementations.md
  after:
    - git:commit
    - git:push
