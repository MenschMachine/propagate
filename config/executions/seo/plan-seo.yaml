plan-seo:
  repository: pdfdancer-marketing-data
  git:
    branch:
      name_key: :plan-seo-branch-name
      base: main
    commit:
      message_source: commit_message
    push:
      remote: origin
    pr:
      base: main
      body_key: :plan-seo-summary
      number_key: :plan-seo-pr-number
  sub_tasks:
    - id: set-branch
      before:
        - 'propagate context set :plan-seo-branch-name "seo/plan-$(date -u +%Y-%m-%d)"'
    - id: create-branch
      before:
        - git:branch
    - id: strategy
      before:
        - 'propagate context delete :plan-approved'
        - 'propagate context delete --global :strategy-path'
        - 'propagate context delete --global :implementation-briefs-path'
        - 'propagate context delete --global :implementation-briefs'
        - 'propagate context delete --global :implementation-targets'
        - 'propagate context delete --global :has-implementation-targets'
        - 'propagate context delete :review-findings'
        - 'propagate context delete :review-suggestions'
        - 'propagate context delete :revision-reason'
      prompt: ./prompts/seo/plan-seo.md
      must_set:
        - key: ":strategy-path"
          scope: global
        - key: ":implementation-briefs-path"
          scope: global
        - key: ":implementation-briefs"
          scope: global
        - key: ":implementation-targets"
          scope: global
    - id: review-plan
      before:
        - 'propagate context delete :review-findings'
        - 'propagate context delete :review-suggestions'
      prompt: ./prompts/seo/review-plan.md
    - id: reroute-on-review-findings
      when:
        key: ":review-findings"
        scope: execution
      after:
        - 'propagate context set :revision-reason review-findings'
      goto: strategy
      max_goto: 5
    - id: summarize
      prompt: ./prompts/seo/summarize-plan-seo.md
      must_set:
        - ":plan-seo-summary"
    - id: publish
      before:
        - git:commit
        - git:push
        - git:pr
    - id: wait-for-verdict
      after:
        - git:pr-comments-list :pr-comments
      wait_for_signal: pull_request.labeled
      routes:
        - when:
            label: "changes_required"
            pr_number:
              equals_context: ":plan-seo-pr-number"
          goto: strategy
        - when:
            label: "approved"
            pr_number:
              equals_context: ":plan-seo-pr-number"
          continue: true
    - id: route-after-approval
      before:
        - 'if propagate context get --global :has-implementation-targets >/dev/null 2>&1; then propagate context set :plan-approved true; fi'
