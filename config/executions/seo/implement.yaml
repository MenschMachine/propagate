implement:
  repository: pdfdancer-www
  git:
    branch:
      name_key: :implement-branch-name
      base: main
    commit:
      message_source: commit_message
    push:
      remote: origin
    pr:
      base: main
      body_key: :implement-summary
      number_key: :implement-pr-number
  sub_tasks:
    - id: set-branch
      before:
        - 'propagate context set :implement-branch-name "seo/implement-$(date -u +%Y-%m-%d)"'
    - id: create-branch
      before:
        - git:branch
    - id: code
      before:
        - 'propagate context delete :review-findings'
        - 'propagate context delete :review-suggestions'
      prompt: ./prompts/seo/implement.md
    - id: review
      before:
        - 'propagate context delete :review-findings'
        - 'propagate context delete :review-suggestions'
      prompt: ./prompts/seo/review-implement.md
    - id: reroute-on-review-findings
      when: ":review-findings"
      after:
        - 'propagate context set :revision-reason review-findings'
      goto: code
    - id: reroute-on-suggestions
      when: ":review-suggestions"
      after:
        - 'propagate context set :revision-reason review-suggestions'
      goto: code
      max_goto: 3
      on_max_goto: continue
    - id: summarize
      prompt: ./prompts/seo/summarize-implement.md
    - id: publish
      before:
        - 'propagate context set :applied-suggestions "$(propagate context get :suggestions --task suggest)"'
        - 'propagate context set :implement-summary "$(printf "%s\n\n---\n\n## Applied Suggestions\n\n%s" "$(propagate context get :implement-summary)" "$(propagate context get :applied-suggestions)")"'
        - git:commit
        - git:push
        - git:pr
    - id: wait-for-checks
      before:
        - git:pr-checks-wait :implement-check-results :checks-passed 10 1800
    - id: reroute-on-check-failure
      when: "!:checks-passed"
      after:
        - 'propagate context set :revision-reason check-failure'
      goto: code
    - id: wait-for-verdict
      after:
        - git:pr-comments-list :pr-comments
      wait_for_signal: pull_request.labeled
      routes:
        - when:
            label: "changes_required"
            pr_number:
              equals_context: ":implement-pr-number"
          goto: code
        - when:
            label: "approved"
            pr_number:
              equals_context: ":implement-pr-number"
          continue: true
