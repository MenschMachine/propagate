"{{ execution_name }}":
  repository: "{{ repository }}"
  agent: "{{ agent| }}"
  git:
    branch:
      name_template: "{{ branch_name_template }}"
      base: main
    commit:
      message_template: "{{ commit_message_template }}"
    push:
      remote: origin
    pr:
      base: main
      body_key: "{{ pr_body_key }}"
      number_key: "{{ pr_number_key }}"
  after:
    - 'propagate context set approved-marker true'
    - "{{ aggregate_after_command }}"
  sub_tasks:
    - id: validate-context
      before: "{{ validate_before_actions }}"
      prompt: "{{ validate_prompt }}"
    - id: implement
      before:
        - git:branch
        - 'propagate context delete :wontfix'
      prompt: "{{ implement_prompt }}"
    - id: clear-findings-on-wontfix
      when: ":wontfix"
      after:
        - 'propagate context delete :review-findings'
    - id: review
      when: "!:wontfix"
      before:
        - 'propagate context delete :review-findings'
      prompt: "{{ review_prompt }}"
    - id: reroute-on-review-findings
      when: ":review-findings"
      after:
        - 'propagate context set :revision-reason review-findings'
      goto: implement
    - id: summarize
      prompt: "{{ summarize_prompt }}"
      must_set:
        - "{{ pr_body_key }}"
    - id: publish
      before:
        - git:publish
    - id: post-wontfix-comment
      when: ":wontfix"
      before:
        - git:pr-comment-add :wontfix
    - id: wait-for-checks
      before:
        - git:pr-checks-wait :review-check-results :checks-passed 10 1800
    - id: reroute-on-check-failure
      when: "!:checks-passed"
      after:
        - 'propagate context set :revision-reason check-failure'
      goto: implement
    - id: wait-for-verdict
      when: ":checks-passed"
      after:
        - git:pr-comments-list :pr-comments
      wait_for_signal: pull_request.labeled
      routes:
        - when:
            repository: "{{ github_repository }}"
            label: changes_required
            pr_number:
              equals_context: "{{ pr_number_key }}"
          goto: implement
        - when:
            repository: "{{ github_repository }}"
            label: approved
            pr_number:
              equals_context: "{{ pr_number_key }}"
          continue: true
